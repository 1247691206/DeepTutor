# 每个 surface / slot 的焦点 + 推荐 section（中文）。

surfaces:
  chat:
    focus: "用户呈现出的稳定误解、已经显示出掌握的概念、以及反复回到的持久话题。剔除单轮闲聊。"
    sections: ["误解", "掌握", "话题"]
  notebook:
    focus: "笔记中反复出现的主题、用户偏好的格式、以及反复出现的问题。"
    sections: ["主题", "格式", "悬而未决的问题"]
  quiz:
    focus: "答题中的错误模式、正确率高/低的话题、用户在哪类题型上挣扎。"
    sections: ["错误模式", "强项", "弱项"]
  kb:
    focus: "用户的文档兴趣、对知识库的查询模式、文献库中的空白。"
    sections: ["兴趣", "高频查询", "文献库空白"]
  book:
    focus: "阅读节奏、卡点（页面重复打开或停留）、用户重点标注的主题。"
    sections: ["节奏", "卡点", "标注主题"]
  partner:
    focus: "伙伴对话中反复出现的主题、不同频道的行为差异。"
    sections: ["主题", "频道"]
  cowriter:
    focus: "写作风格偏好、反复修改的模式、用户起草的话题。"
    sections: ["风格", "反复修改", "话题"]

slots:
  recent:
    focus: "面向学生的近期学习小结，帮助学生自省并决定下一步。要点名具体主题/试卷。「近期重点」=最近在练什么；「进步」=明显有提升的地方；「下一步」=接下来最该练的（每条都写成可执行的主题）。这份内容直接展示给学生看。"
    sections: ["近期重点", "进步", "下一步"]
  profile:
    focus: "展示给学生的持久学习画像。「强项」=稳定做得好的主题/技能；「待加强」=反复出错、需要练习的具体主题/技能（要写具体，如「向量分解」「分部积分」，以便据此出题）；「学习风格」=最适合的学习方式。只接受多个 L2 条目支撑的判断。"
    sections: ["强项", "待加强", "学习风格"]
  scope:
    focus: "学生有过实际接触的概念，按信心分组并绑定 L2 证据。「强项」=有信心/做对；「练习中」=进行中；「待加强」=薄弱或易错。"
    sections: ["强项", "练习中", "待加强"]
