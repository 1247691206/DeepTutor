# Per-surface and per-slot focus + suggested sections (English).
# Same data shape used by every mode's prompt template.

surfaces:
  chat:
    focus: "Stable misconceptions the user has surfaced, concepts they've demonstrated mastery of, and durable topics they keep returning to. Drop per-turn chatter."
    sections: ["Misconceptions", "Mastery", "Topics"]
  notebook:
    focus: "Recurring note themes, formats the user prefers, and questions they keep coming back to in their notes."
    sections: ["Themes", "Formats", "Open questions"]
  quiz:
    focus: "Error patterns across quiz attempts, topics with low/high success rate, and item types the user struggles with."
    sections: ["Error patterns", "Strong topics", "Struggling topics"]
  kb:
    focus: "Document interests, query patterns into the knowledge base, and gaps in user's library."
    sections: ["Interests", "Frequent queries", "Library gaps"]
  book:
    focus: "Reading pacing, sticking points (pages reopened or paused), and topics the user annotates heavily."
    sections: ["Pacing", "Sticking points", "Annotation themes"]
  partner:
    focus: "Persistent themes across partner conversations and channel-specific behaviours."
    sections: ["Themes", "Channels"]
  cowriter:
    focus: "Writing style preferences, recurring revisions, and topics the user drafts about."
    sections: ["Style", "Recurring revisions", "Topics"]

slots:
  recent:
    focus: "A short, learner-facing recap of recent study that helps the learner reflect and decide what to do next. Name concrete topics/papers. 'Recent focus' = what they have been practising; 'Progress' = where they are clearly improving; 'Next steps' = the most useful things to practise next (each phrased as an actionable topic). This is shown directly to the learner."
    sections: ["Recent focus", "Progress", "Next steps"]
  profile:
    focus: "Durable learner portrait, shown to the learner. 'Strengths' = topics/skills they consistently handle well; 'Needs work' = specific topics/skills they repeatedly struggle with, named concretely (e.g. 'vector resolution', 'integration by parts') so they can be practised; 'Learning style' = how they learn best. ONLY claims supported by multiple L2 entries."
    sections: ["Strengths", "Needs work", "Learning style"]
  scope:
    focus: "Concepts and topics the learner has demonstrably engaged with, grouped by confidence and tied to L2 evidence. 'Strengths' = confident/correct; 'Practicing' = in progress; 'Needs work' = weak or error-prone."
    sections: ["Strengths", "Practicing", "Needs work"]
